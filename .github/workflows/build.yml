# GitHub Actions CI script for mkps2iso

name: Build mkps2iso
on:   [ push, pull_request ]

jobs:
  build-windows:
    name:    Build mkps2iso on Windows
    runs-on: windows-latest

    steps:
    - name: Fetch repo contents
      uses: actions/checkout@main

    - name: Build and package mkps2iso
      run: |
        cmake --workflow ci

    - name: Upload build artifacts
      uses: actions/upload-artifact@main
      with:
        name: mkps2iso-windows
        path: |
          build/packages/*
          !build/packages/_CPack_Packages

  build-linux:
    name:    Build mkps2iso on Linux
    runs-on: ubuntu-22.04

    steps:
    - name: Fetch repo contents
      uses: actions/checkout@main

    - name: Build and package mkps2iso
      run: |
        cmake --workflow ci

    - name: Upload build artifacts
      uses: actions/upload-artifact@main
      with:
        name: mkps2iso-linux
        path: |
          build/packages/*
          !build/packages/_CPack_Packages

  build-macos:
    name:    Build mkps2iso on macOS
    runs-on: macos-latest
    env:
      MACOSX_DEPLOYMENT_TARGET: "10.15"
      CMAKE_OSX_ARCHITECTURES:  "x86_64;arm64"

    steps:
    - name: Fetch repo contents
      uses: actions/checkout@main

    - name: Build and package mkps2iso
      run: |
        cmake --workflow ci

    - name: Upload build artifacts
      uses: actions/upload-artifact@main
      with:
        name: mkps2iso-macos
        path: |
          build/packages/*
          !build/packages/_CPack_Packages

  # This job takes care of creating a new release and upload the build
  # artifacts if the last commit is associated to a tag.
  create-release:
    name:    Create release
    runs-on: ubuntu-latest
    needs:   [ build-windows, build-linux, build-macos ]

    steps:
    - name: Fetch build artifacts
      if:   ${{ github.ref_type == 'tag' }}
      uses: actions/download-artifact@main

    - name: Publish release
      if:   ${{ github.ref_type == 'tag' }}
      uses: softprops/action-gh-release@master
      with:
        fail_on_unmatched_files: true
        generate_release_notes:  true
        files: |
          mkps2iso-windows/*
          mkps2iso-linux/*
          mkps2iso-macos/*
